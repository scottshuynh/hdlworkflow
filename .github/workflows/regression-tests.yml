# Setup environments then run regression tests

name: Regression Tests

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test_ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        nvc-version: ["r1.18.2", "r1.19.3"]
        cocotb-refs: [v1.9.2, v2.0.0, v2.0.1]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[test,dev]"
        python -m pip install git+https://github.com/cocotb/cocotb.git@${{ matrix.cocotb-refs }}
    - name: Setup NVC
      uses: nickg/setup-nvc@v1
      with:
        version: ${{ matrix.nvc-version }}
    - name: Linter check using ruff
      run: |
        ruff check
    - name: Check hdlworkflow tests
      run: |
        pytest

  test_windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        nvc-version: ["r1.18.2", "r1.19.3"]
        cocotb-refs: [v2.0.1]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Setup NVC
      uses: nickg/setup-nvc@v1
      with:
        version: ${{ matrix.nvc-version }}
    - run: |
        echo "/c/Program\ Files/NVC/bin" >> $GITHUB_PATH
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[test,dev]"
        python -m pip install git+https://github.com/cocotb/cocotb.git@${{ matrix.cocotb-refs }}
    - name: Linter check using ruff
      shell: bash
      run: |
        ruff check
    - name: Check hdlworkflow tests
      shell: bash
      run: |
        pytest